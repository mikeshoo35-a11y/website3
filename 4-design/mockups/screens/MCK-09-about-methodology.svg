<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-labelledby="title desc">
<title id="title">About methodology section</title>
<desc id="desc">What AI Friendly Docs is prose section</desc>
<rect width="1280" height="320" fill="#fafaf9"/>
<text x="40" y="48" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600" fill="#1f2937">What AI Friendly Docs is</text>
<text x="40" y="90" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Text-first structured documentation written for human readers</text>
<text x="40" y="110" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">and AI agents that elaborate, validate, and extend the spec.</text>
<text x="40" y="130" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">Prose sections replace ad-hoc wikis and ticket-only knowledge.</text>
